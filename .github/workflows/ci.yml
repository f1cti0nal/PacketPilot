# PacketPilot CI.
#
# NOTE: this assumes PacketPilot is the repository root. If PacketPilot is kept as a
# subdirectory of a larger repo, move this file to <repo-root>/.github/workflows/ and
# prefix each `working-directory` with `PacketPilot/` (plus add a `paths:` filter).
name: ci

on:
  push:
    branches: [main, master, dev]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine — fmt · clippy · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: C-compiler-free gate (shipped graph pulls no cc crate)
        run: |
          if cargo tree -e no-dev | grep -Ei "zstd-sys|lz4-sys|cc |cmake|bzip2-sys|openssl-sys|zlib-sys"; then
            echo "::error::shipped dependency graph pulls a C-compiled crate"; exit 1
          fi

  ui:
    name: ui — typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      # The wasm engine bundle (ui/src/wasm/) is gitignored and regenerated from
      # engine/crates/ppcap-wasm; `tsc -b`/`vite build` need it present to resolve
      # the `../wasm/ppcap_wasm.js` import.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine/crates/ppcap-wasm
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.125
      - run: npm run build:wasm
      - run: npm run test:coverage
      - run: npm run build

  desktop:
    name: desktop — tauri build (windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.125
      # tauri build runs `npm run build` (vite), which needs the wasm bundle present.
      - run: npm run build:wasm
      # MSVC toolchain + WebView2 are preinstalled on windows-latest runners.
      - run: npx tauri build --no-bundle
