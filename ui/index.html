<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PacketPilot — In-browser PCAP threat triage</title>
    <meta
      name="description"
      content="Analyze packet captures in your browser — ranked, MITRE-mapped threat findings in seconds. Nothing is uploaded. Free to start."
    />
    <!-- Canonical + social share card. The SEO generator (scripts/gen-seo-html.mjs)
         rewrites og:title/og:description/og:url/canonical per tool page; the shared
         og:image and card type are inherited. -->
    <link rel="canonical" href="https://packetpilot.app/" />
    <meta property="og:site_name" content="PacketPilot" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://packetpilot.app/" />
    <meta property="og:title" content="PacketPilot — In-browser PCAP threat triage" />
    <meta
      property="og:description"
      content="Turn raw packet captures into severity-ranked, MITRE-mapped threat findings in seconds — nothing ever leaves your device."
    />
    <meta property="og:image" content="https://packetpilot.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PacketPilot — triage faster, dig deeper, keep it private." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PacketPilot — In-browser PCAP threat triage" />
    <meta
      name="twitter:description"
      content="Turn raw packet captures into severity-ranked, MITRE-mapped threat findings in seconds — nothing ever leaves your device."
    />
    <meta name="twitter:image" content="https://packetpilot.app/og.png" />
    <!-- Resolve the theme before first paint to avoid a flash. Mirrors lib/theme.ts
         (stored preference → OS preference → dark). Keep the key string in sync. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("packetpilot.theme.v1");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          var el = document.documentElement;
          el.dataset.theme = theme;
          el.classList.toggle("dark", theme === "dark");
          var density = localStorage.getItem("packetpilot.density.v1");
          el.dataset.density = density === "compact" ? "compact" : "comfortable";
        } catch (e) {}
      })();
    </script>
    <!--
      Type system — Geist + Geist Mono. For the air-gapped desktop build, self-host instead:
        npm i @fontsource/geist-sans @fontsource/geist-mono
      and import the weights in src/main.tsx. (CDN here degrades gracefully offline.)
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Marketing landing type — Inter Tight (display) + Inter (body). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
