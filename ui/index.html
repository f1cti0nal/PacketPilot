<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PacketPilot</title>
    <!-- Resolve the theme before first paint to avoid a flash. Mirrors lib/theme.ts
         (stored preference → OS preference → dark). Keep the key string in sync. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("packetpilot.theme.v1");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          var el = document.documentElement;
          el.dataset.theme = theme;
          el.classList.toggle("dark", theme === "dark");
        } catch (e) {}
      })();
    </script>
    <!--
      Cockpit type roles. For the air-gapped desktop build, self-host instead:
        npm i @fontsource/space-grotesk @fontsource/inter @fontsource/roboto-mono
      and import the weights in src/main.tsx. (CDN here degrades gracefully offline.)
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
